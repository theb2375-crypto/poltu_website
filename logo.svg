<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5ECBB8"/>
      <stop offset="100%" stop-color="#2E7A6C"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="160" height="160" rx="38"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="160" height="160" rx="38" fill="url(#bg-grad)"/>

  <!-- Top glass sheen -->
  <rect width="160" height="80" rx="38" fill="url(#sheen)" clip-path="url(#card-clip)"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="157" height="157" rx="36.5"
        stroke="white" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>

  <!-- ── P letterform ── -->
  <!-- Vertical stem -->
  <rect x="36" y="34" width="22" height="92" rx="11" fill="white"/>

  <!-- Bowl — arc from top-of-stem to mid-stem via right side -->
  <!-- Stroked arc creates the curved right side of the P -->
  <path d="M 58 34 A 34 34 0 0 1 58 90"
        stroke="white" stroke-width="22" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Saffron accent dot — India reference, bottom-right ── -->
  <circle cx="122" cy="122" r="16" fill="#FF9933"/>
  <!-- Tiny Ashoka Chakra ring inside the dot -->
  <circle cx="122" cy="122" r="7" stroke="#0A3380" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- 8 spokes -->
  <g stroke="#0A3380" stroke-width="1.2" opacity="0.55" stroke-linecap="round">
    <line x1="122" y1="115.5" x2="122" y2="113"/>
    <line x1="122" y1="128.5" x2="122" y2="131"/>
    <line x1="115.5" y1="122" x2="113" y2="122"/>
    <line x1="128.5" y1="122" x2="131" y2="122"/>
    <line x1="117" y1="117" x2="115.1" y2="115.1"/>
    <line x1="127" y1="127" x2="128.9" y2="128.9"/>
    <line x1="127" y1="117" x2="128.9" y2="115.1"/>
    <line x1="117" y1="127" x2="115.1" y2="128.9"/>
  </g>
</svg>
